<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="100%" height="100%">
  <defs>
    <style>
      .主色 { fill: #A38A75; }
      .線色 { stroke: #A38A75; fill: none; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; stroke-miterlimit: 10; }
      .星色 { fill: #A38A75; }
      .ロゴテキスト {
        font-family: 'Playfair Display', 'Didot', 'Noto Serif JP', serif;
        font-size: 52px;
        fill: #A38A75;
        letter-spacing: 0.12em;
        text-anchor: middle;
        font-weight: 300;
      }
    </style>
  </defs>

  <!-- ロゴマークグループ -->
  <g transform="translate(0, -20)">
    <!-- Bの縦棒（セリフ付き） -->
    <path class="主色" d="M 235,175 L 290,175 L 290,183 L 273,183 L 273,377 L 290,377 L 290,385 L 235,385 L 235,377 L 252,377 L 252,183 L 235,183 Z" />

    <!-- Bの曲線（中央で交差するエレガントな形状） -->
    <path class="主色" d="M 273,183 C 295,183 330,183 345,208 C 358,228 350,253 328,268 C 358,283 368,313 368,340 C 368,370 338,382 300,383 L 273,383 L 273,375 L 300,375 C 330,375 358,365 358,338 C 358,310 328,288 290,288 L 273,288 L 273,278 L 290,278 C 322,278 340,260 340,238 C 340,215 315,191 273,191 Z" />

    <!-- Cと横顔シルエット -->
    <!-- Bの輪郭から広がり、右側で女性の美しい横顔シルエットを描いて戻る -->
    <path class="線色" d="M 330,195 C 355,180 405,180 435,215 C 455,238 460,265 450,280 C 458,288 475,292 480,305 C 483,313 475,323 468,328 C 472,333 475,340 472,347 C 468,355 455,360 450,368 C 445,375 448,382 440,390 C 430,400 400,410 355,395" />

    <!-- 星マーク（4つの角を持つ輝き） -->
    <path class="星色" d="M 385,260 C 385,270 388,273 398,273 C 388,273 385,276 385,286 C 385,276 382,273 372,273 C 382,273 385,270 385,260 Z" />
  </g>

  <!-- ロゴテキスト -->
  <text x="300" y="475" class="ロゴテキスト">BIJOU CLINIC</text>
</svg>
